services:
  # PHP Application (Unified Local & Production)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: logbook-app
    container_name: logbook-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - logbook_network
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-logbook-server}
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD:-root}

  # Nginx Web Server (Using Production-Ready Config)
  web:
    image: nginx:alpine
    container_name: logbook-web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - logbook_network

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: logbook-db
    command: ["mysqld", "--skip-name-resolve"]
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-logbook-server}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
    ports:
      - "33061:3306"
    volumes:
      - logbook_db_data:/var/lib/mysql
    networks:
      - logbook_network

networks:
  logbook_network:
    driver: bridge

volumes:
  logbook_db_data:
    driver: local
